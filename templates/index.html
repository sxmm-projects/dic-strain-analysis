<!--index.html-->
<!DOCTYPE html>
<html lang="en">
  <head>
    <title>SSCs-gui</title>
    <meta charset="UTF-8">
    <meta name = "viewport" content = "width = device-width , initial-scale = 1">
    <!-- https://developer.mozilla.org/en-US/docs/Web/HTTP/CSP -->
    <!--<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'">-->
    <!--CSS-->
    <link rel="stylesheet" href="{{ url_for('static', filename='styles/style.css') }}">
    <!--JS-->
    <script src="{{ url_for('static', filename='js/javascript.js') }}"></script>
    <!--<script async src="{{ url_for('static', filename='js/opencv.js') }}"></script>-->
    <!--pyscript-->
    <!--<link rel="stylesheet" href="https://pyscript.net/latest/pyscript.css" />
    <script defer src="https://pyscript.net/latest/pyscript.js"></script>-->
    <!--font-->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <!--Logo and page-->
    <div class="header">
        <div class="left-section">
            <img class="logo" src="../static/2V9f8W-LogoMakr.png">
        </div>
        <div class="right-section">
            <a href="{{url_for('calibration')}}" class="page">Calibration</a>
            <a href="#" class="page" onclick="strain_cal()">Strain Cal</a>
            <!--<a href="Digital Image Correlation Engine/DICe_gui.exe" class="page">Strain cal</a>-->
        </div>
    </div>
    <!--view image-->
    <div id="viewphoto" class="viewphoto">
      <span class="close" onclick="closebutton()">&times;</span>
      <div class="watch">
        <div class="modal-content1">
          <img id="modalImage1" class="image">
        </div>
        <div class="modal-content2">
          <img id="modalImage2" class="image">
        </div>
      </div>
      <a class="prev" onclick="changePhoto(-1)">&#10094;</a>
      <a class="next" onclick="changePhoto(1)">&#10095;</a>
    </div>    
    <div class="device">
      <div class="sidebar-header right-line bottom-line">
        <h1 class="text2">Operation</h1>
      </div>
      <div class="sidebar-header bottom-line">
        <div class="functions">
          <h1 class="icon">
            <button class="icon-button" onclick="reload()">
              <i class="bi bi-arrow-clockwise"></i>
            </button>
            <button class="icon-button" onclick="startCapture()">
              <i class="bi bi-play-fill"></i>
            </button>
            <button class="icon-button" onclick="pauseCapture()">
              <i class="bi bi-pause"></i>
            </button>
            <button class="icon-button" onclick="stopCapture()">
              <i class="bi bi-stop-fill"></i>
            </button>
            <button class="icon-button" onclick="viewCapture()">
              <i class="bi bi-folder2-open"></i>
            </button>
            <button class="icon-button" onclick="saveDirectory()">
              <i class="bi bi-floppy"></i>
            </button>
          </h1>
        </div>
      </div>
    </div>
    <div class="feature">
      <div class="right-line">
        <div class="display-device bottom-line">
          <h2 class="text2 margin margin-vertical">Status:</h2>
          <h3 class="text2 margin-vertical margin-left"><div id="status1" class="status"></div>Start</h3>
          <h3 class="text2 margin-vertical margin-left"><div id="status2" class="status"></div>Pause</h3>
          <h3 class="text2 margin-vertical margin-left"><div id="status3" class="status"></div>Stop</h3>
          <h2 class="text2 margin margin-vertical">FPS:</h2>
          <h3 id="real-fps" class="text2 margin-vertical margin-left"></h3>
        </div>
        <div class="sidebar-header bottom-line"><h1 class="text">Features</h1></div>
        <div class="sidebar-feacture">
          <h2 class="text"><input id="shot" type="checkbox" class="checkbox" onclick="shot_mode()">Shot Mode</h2>
          <h2 class="text"><input id="burst" type="checkbox" class="checkbox" checked onclick="burst_mode()">Burst Mode</h2>
          <h2 class="text">Frequency (fps)</h2>
          <input id="frequency" type="text" class="input-text" placeholder="Default: 12">
          <h2 class="text">Set timer</h2>
          <input id="minute" type="text" class="input-text time" placeholder=""><p> min</p>
          <input id="second" type="text" class="input-text time" placeholder=""><p> sec</p>
          <h2 class="text">Prefix</h2>
          <input id="prefix" type="text" class="input-text end" placeholder="Default: img">
        </div>
      </div>
      <div class="camera">
        <div class="camera-view">
          <div id="on-off" class="on-off" onclick="camera()">Camera Stream: ON</div>
        </div>
        <div class="camera-position">
          <div class="Leftcamera">
            <img id="realtime1" class="realtime hidden" src="{{ url_for('cam1_route')}}">
          </div>
          <div class="Rightcamera">
            <img id="realtime2" class="realtime hidden" src="{{ url_for('cam2_route')}}">
          </div>
        </div>
      </div>
    </div>
    <script>
      let onoff = document.getElementById("on-off"),
      realtimeimg1 = document.getElementById("realtime1"),
      realtimeimg2 = document.getElementById("realtime2");
      function camera(){
        if(onoff.innerHTML==="Camera Stream: ON"){
          onoff.innerHTML="Camera Stream: OFF"
        }
        else{
          onoff.innerHTML="Camera Stream: ON"
        }
        fetch('/camera')
          .then(response => response.json())
          .then(data => {
            if(data.switch){
              realtimeimg1.classList.remove('hidden');
              realtimeimg2.classList.remove('hidden');
            }
            else{
              realtimeimg1.classList.add('hidden');
              realtimeimg2.classList.add('hidden');
            }
        });
      }

      function strain_cal() {
        fetch('/strain_cal')
            .then(response => response.json())
            .then(data => {
                if (data.status === 'success') {
                    alert('Strain calculation started');
                } else {
                    alert('Error: ' + data.message);
                }
            });
    }
    
    </script>
  </body>
</html>
